version: '3.8'

services:
  web:
    image: nginx:alpine
    ports:
      - "8080:80"   # Escucha el Frontend en el puerto 8080
      - "8081:81"   # Escucha el Backend en el puerto 8081
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - ./:/var/www/html